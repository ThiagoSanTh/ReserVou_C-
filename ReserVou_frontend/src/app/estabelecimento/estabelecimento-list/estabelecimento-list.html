<mat-toolbar color="primary">
  <span>ReserVou</span>
  <span class="spacer"></span>
  <button mat-button (click)="irParaListaDeEstabelecimentos()">Listar Estabelecimentos</button>
  <button mat-button (click)="irParaAdicionarEstabelecimento()">Novo Estabelecimento</button>
</mat-toolbar>

<router-outlet></router-outlet>

<h2>Lista de Estabelecimentos</h2>

<table mat-table [dataSource]="estabelecimentos" class="mat-elevation-z8" style="width: 100%">
  
  <!-- ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    
    <td mat-cell *matCellDef="let estabelecimento">{{ estabelecimento.id }}</td> <!-- ✅ LINHA ALTERADA -->
  </ng-container>

  <!-- Nome -->
  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let estabelecimento">{{ estabelecimento.nome }}</td> <!-- ✅ LINHA ALTERADA -->
  </ng-container>

  <!-- Endereço -->
  <ng-container matColumnDef="endereco">
    <th mat-header-cell *matHeaderCellDef>Endereço</th>
    <td mat-cell *matCellDef="let estabelecimento">{{ estabelecimento.endereco }}</td> <!-- ✅ LINHA ALTERADA -->
  </ng-container>

  <ng-container matColumnDef="tipo">
    <th mat-header-cell *matHeaderCellDef>Tipo</th>
    <td mat-cell *matCellDef="let estabelecimento">{{ estabelecimento.tipo }}</td> <!-- ✅ LINHA ALTERADA -->
  </ng-container>

  <!-- Ações -->
  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let estabelecimento"> <!-- ✅ LINHA ALTERADA -->
      <button mat-button color="primary" (click)="editar(estabelecimento)">Editar</button>
      <button mat-button color="warn" (click)="remover(estabelecimento)">Remover</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
