<h2>Novo Usuário</h2>

<form (ngSubmit)="adicionarUsuario()">
    <label>
        Nome:
        <input [(ngModel)]="Nome" name="Nome" required />
    </label>
    <label>
      Tipo de Usuário:
      <select [(ngModel)]="Tipo" name="Tipo" required>
          <option [ngValue]="null" disabled>Selecione o Tipo</option> 
          
          <option *ngFor="let item of tiposUsuario" [ngValue]="item.valor">
              {{ item.nome }} 
          </option>
      </select>
    </label>

    <button  type="submit">
        Salvar
    </button>
</form>

<style>
  .full-width {
    width: 100%;
    margin-bottom: 1rem;
  }
</style>
