<mat-toolbar color="primary">
    <span>ReserVou</span>
    <span class="spacer"></span>
    <button mat-button (click)="irParaListaDeUsuarios()">Listar Usuários</button>
    <button mat-button (click)="irParaAdicionarUsuario()">Novo Usuário</button>
  </mat-toolbar>
  
  <router-outlet></router-outlet>
  
  <h2>Lista de Usuários</h2>
  
  <table mat-table [dataSource]="usuarios" class="mat-elevation-z8" style="width: 100%">
    
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      
      <td mat-cell *matCellDef="let usuario">{{ usuario.id }}</td> <!-- ✅ LINHA ALTERADA -->
    </ng-container>
  
    <!-- Nome -->
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let usuario">{{ usuario.nome }}</td> <!-- ✅ LINHA ALTERADA -->
    </ng-container>
  
    <!-- Endereço -->
    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell *matCellDef="let usuario"> {{ TipoUsuario[usuario.tipo] }} </td>
    </ng-container>
  
    <!-- Ações -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let usuario"> <!-- ✅ LINHA ALTERADA -->
        <button mat-button color="primary" (click)="editar(usuario)">Editar</button>
        <button mat-button color="warn" (click)="remover(usuario)">Remover</button>
      </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
  </table>
